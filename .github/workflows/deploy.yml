name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # 06:00 UTC on the 1st of every month — refresh data from PBH
    - cron: "0 6 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyproj shapely

      # Cache the generated data per month: the first run of a month regenerates
      # from PBH; later pushes in the same month reuse the cache and skip the
      # heavy generation steps, so deploys stay fast.
      - name: Cache month key
        id: month
        run: echo "key=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Restore generated data
        id: data-cache
        uses: actions/cache@v4
        with:
          path: docs/data
          key: gpx-data-${{ steps.month.outputs.key }}

      - name: Fetch data from PBH
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: python scripts/generate_data.py

      - name: Build GPX files
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: python scripts/build_gpx.py

      - name: Build street GPX
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: python scripts/build_streets.py

      - name: Copy assets into site
        run: mkdir -p docs/assets && cp assets/* docs/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
