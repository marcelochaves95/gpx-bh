<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPX BH — GPX dos bairros de Belo Horizonte</title>
  <meta name="description" content="Gere arquivos GPX dos bairros de Belo Horizonte direto no navegador.">
  <link rel="icon" type="image/png" href="assets/belo-horizonte-flag.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><img class="flag" src="assets/belo-horizonte-flag.png" alt=""> GPX BH</h1>
    <p>Selecione um bairro de Belo Horizonte e baixe o arquivo <strong>GPX</strong>.</p>
  </header>

  <main>
    <div class="controls">
      <label for="neighborhood">Bairro</label>
      <div class="combo">
        <input id="neighborhood" placeholder="Digite ou escolha um bairro…" autocomplete="off"
               role="combobox" aria-autocomplete="list" aria-controls="options" aria-expanded="false" disabled>
        <ul id="options" class="options" role="listbox" hidden></ul>
      </div>
      <div class="actions">
        <button id="download" class="action" disabled title="Baixar GPX">
          <img class="icon" src="assets/download.png" alt=""><span>GPX</span>
        </button>
        <button id="open-strava" class="action" disabled title="Abrir no Strava">
          <img class="logo" src="assets/strava-logo.png" alt="Strava">
        </button>
        <button id="open-gpxstudio" class="action" disabled title="Abrir no GPX Studio">
          <img class="logo" src="assets/gpx-studio-logo.png" alt="GPX Studio">
        </button>
      </div>
      <p id="status" class="status">Carregando bairros…</p>
    </div>
    <div id="map" aria-label="Mapa do bairro selecionado"></div>
  </main>

  <footer>
    <span>Dados: <a href="https://geonetwork.pbh.gov.br/geonetwork/srv/por/catalog.search#/metadata/db4df402-3e4c-4338-9c8b-d8e36c00ccce" target="_blank" rel="noopener">PBH · IDE-BHGEO</a></span>
    <span>·</span>
    <a class="github-link" href="https://github.com/marcelochaves95/gpx-bh" target="_blank" rel="noopener" title="Código no GitHub" aria-label="Código no GitHub">
      <svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
